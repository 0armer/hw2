name: Build and Push Docker Image CI

# main 브랜치에 코드가 push될 때 워크플로우가 실행됩니다.
on:
  push:
    branches:
      - main
    paths:
      - 'age_prediction_api/**'
      - '.github/workflows/ci.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. GitHub 저장소 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인 (GitHub Secrets 활용)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # 3. Docker 이미지 메타데이터(태그 등) 설정
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 4. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./age_prediction_api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # labels: ${{ steps.meta.outputs.labels }}
          # # Docker 빌드 캐시를 활용하여 빌드 속도를 개선합니다.
          # cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:buildcache
          # cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:buildcache,mode=max

  deploy:
    name: Deploy to Self-Hosted Runner
    needs: build-and-push
    # 등록하신 self-hosted runner 에서 이 작업을 실행합니다.
    runs-on: self-hosted
    
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest

      # 기존에 실행 중인 컨테이너가 있다면 강제 종료 및 삭제합니다. 
      # (처음 실행하는 경우 에러가 날 수 있으므로 continue-on-error: true 옵션을 사용해 무시합니다)
      - name: Stop and remove existing container
        continue-on-error: true
        run: docker rm -f age-prediction-api

      # 새로운 이미지를 기반으로 컨테이너를 백그라운드(-d)에서 띄웁니다.
      - name: Run new container
        run: docker run -d --name age-prediction-api -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
